<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thomas · 42 Paris</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Syne:wght@700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 900px;
    height: 280px;
    overflow: hidden;
    border-radius: 0;
  }

  /* Deep gradient background */
  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0d1117 0%, #1e2a4a 35%, #1a2f5e 65%, #1a3a7a 100%);
  }

  /* Animated mesh glow */
  .glow-1 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,127,212,0.15) 0%, transparent 70%);
    top: -100px; left: -50px;
    animation: driftA 8s ease-in-out infinite;
  }
  .glow-2 {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,90,160,0.2) 0%, transparent 70%);
    bottom: -80px; right: 100px;
    animation: driftB 11s ease-in-out infinite;
  }
  .glow-3 {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,160,255,0.1) 0%, transparent 70%);
    top: 50px; right: 200px;
    animation: driftA 7s ease-in-out infinite reverse;
  }

  @keyframes driftA {
    0%,100% { transform: translate(0,0); }
    33%      { transform: translate(30px,-20px); }
    66%      { transform: translate(-20px,15px); }
  }
  @keyframes driftB {
    0%,100% { transform: translate(0,0); }
    50%      { transform: translate(-40px,-30px); }
  }

  /* Canvas for particles */
  canvas {
    position: absolute;
    inset: 0;
    opacity: 0.7;
  }

  /* Code rain columns */
  .code-rain {
    position: absolute;
    inset: 0;
    overflow: hidden;
    opacity: 0.07;
  }
  .code-col {
    position: absolute;
    top: 0;
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: #7ab3ff;
    line-height: 16px;
    writing-mode: vertical-rl;
    animation: rainFall linear infinite;
    white-space: nowrap;
  }

  @keyframes rainFall {
    from { transform: translateY(-100%); }
    to   { transform: translateY(120%); }
  }

  /* Grid lines */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,127,212,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,127,212,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift {
    from { background-position: 0 0; }
    to   { background-position: 40px 40px; }
  }

  /* Horizontal scan line */
  .scan {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(74,127,212,0.4), transparent);
    animation: scanMove 4s ease-in-out infinite;
  }
  @keyframes scanMove {
    0%   { top: 0%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  /* Main content */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 10;
  }

  /* Terminal prompt line */
  .prompt {
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    color: rgba(122,179,255,0.7);
    opacity: 0;
    animation: fadeIn 0.5s ease forwards 0.2s;
    letter-spacing: 0.05em;
  }
  .prompt .cursor-blink {
    display: inline-block;
    width: 8px; height: 14px;
    background: rgba(122,179,255,0.7);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0; }
  }

  /* Main title */
  .title {
    font-family: 'Syne', sans-serif;
    font-size: 58px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
    opacity: 0;
    transform: translateY(20px);
    animation: heroReveal 0.8s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
    text-shadow: 0 0 60px rgba(74,127,212,0.5), 0 2px 4px rgba(0,0,0,0.5);
  }
  .title span {
    color: #4a9eff;
    position: relative;
  }
  .title span::after {
    content: '';
    position: absolute;
    bottom: 4px; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #4a7fd4, #4a9eff);
    transform: scaleX(0);
    transform-origin: left;
    animation: underlineSlide 0.6s ease forwards 1.1s;
    border-radius: 2px;
  }
  @keyframes underlineSlide {
    to { transform: scaleX(1); }
  }

  @keyframes heroReveal {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Subtitle row */
  .subtitle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1s;
  }

  .badge {
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    font-weight: 400;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .badge-school {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ffffff;
    backdrop-filter: blur(4px);
  }
  .badge-status {
    background: rgba(56,217,169,0.12);
    border: 1px solid rgba(56,217,169,0.3);
    color: #38d9a9;
  }
  .badge-status::before {
    content: '●';
    margin-right: 5px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  .dot-sep {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }

  .subtitle-text {
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    color: rgba(200,210,240,0.8);
    letter-spacing: 0.03em;
  }

  /* Animated tags at bottom */
  .tags {
    display: flex;
    gap: 8px;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.3s;
  }
  .tag {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: rgba(74,127,212,0.8);
    padding: 2px 8px;
    border: 1px solid rgba(74,127,212,0.2);
    border-radius: 4px;
    background: rgba(74,127,212,0.05);
    animation: tagFloat ease-in-out infinite;
  }
  .tag:nth-child(1) { animation-duration: 3.1s; animation-delay: 1.3s; }
  .tag:nth-child(2) { animation-duration: 3.7s; animation-delay: 1.5s; }
  .tag:nth-child(3) { animation-duration: 4.2s; animation-delay: 1.7s; }
  .tag:nth-child(4) { animation-duration: 3.5s; animation-delay: 1.9s; }
  .tag:nth-child(5) { animation-duration: 4s;   animation-delay: 2.1s; }

  @keyframes tagFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 24px; height: 24px;
    opacity: 0.3;
  }
  .corner-tl { top: 16px; left: 16px; border-top: 2px solid #4a7fd4; border-left: 2px solid #4a7fd4; }
  .corner-tr { top: 16px; right: 16px; border-top: 2px solid #4a7fd4; border-right: 2px solid #4a7fd4; }
  .corner-bl { bottom: 16px; left: 16px; border-bottom: 2px solid #4a7fd4; border-left: 2px solid #4a7fd4; }
  .corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid #4a7fd4; border-right: 2px solid #4a7fd4; }

  /* Bottom wave */
  .wave-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    overflow: hidden;
  }
  .wave-svg { position: absolute; bottom: 0; width: 200%; }
  .wave-svg path { fill: rgba(255,255,255,0.04); }
  .wave-a { animation: waveSweep 7s linear infinite; }
  .wave-b { animation: waveSweep 11s linear infinite reverse; opacity: 0.6; }
  @keyframes waveSweep {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
</style>
</head>
<body>
<div class="scene">
  <!-- Layers -->
  <div class="bg"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>
  <div class="grid"></div>

  <!-- Code rain -->
  <div class="code-rain" id="rain"></div>

  <!-- Particle canvas -->
  <canvas id="particles"></canvas>

  <!-- Scan line -->
  <div class="scan"></div>

  <!-- Corner brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Main content -->
  <div class="content">
    <div class="prompt">~/42Paris/thomas $<span class="cursor-blink"></span></div>

    <div class="title">Hi, i'm <span>Thomas</span></div>

    <div class="subtitle-row">
      <span class="badge badge-school">42 Paris</span>
      <div class="dot-sep"></div>
      <span class="badge badge-status">ongoing</span>
      <div class="dot-sep"></div>
      <span class="subtitle-text">computer science student</span>
    </div>

    <div class="tags">
      <span class="tag">C</span>
      <span class="tag">C++</span>
      <span class="tag">Python</span>
      <span class="tag">low-level</span>
      <span class="tag">full-stack</span>
    </div>
  </div>

  <!-- Bottom waves -->
  <div class="wave-wrap">
    <svg class="wave-svg wave-a" viewBox="0 0 1800 50" preserveAspectRatio="none">
      <path d="M0,25 C300,50 600,0 900,25 C1200,50 1500,0 1800,25 L1800,50 L0,50 Z"/>
    </svg>
    <svg class="wave-svg wave-b" viewBox="0 0 1800 50" preserveAspectRatio="none">
      <path d="M0,30 C250,5 550,50 900,30 C1250,10 1550,45 1800,30 L1800,50 L0,50 Z"/>
    </svg>
  </div>
</div>

<script>
// Code rain
const rain = document.getElementById('rain');
const snippets = [
  'malloc','free','sizeof','void*','int','char*','NULL','return','struct',
  'while','fork()','exec','pipe','fd[2]','0x00','0xFF','SIGSEGV','pthread',
  'mutex','socket','bind','listen','accept','send','recv','close','open',
  'read','write','errno','perror','exit','wait','pid_t','mode_t','stat',
];
for (let i = 0; i < 18; i++) {
  const col = document.createElement('div');
  col.className = 'code-col';
  col.style.left = (i * 52 + Math.random() * 20) + 'px';
  col.style.animationDuration = (12 + Math.random() * 18) + 's';
  col.style.animationDelay = (-Math.random() * 20) + 's';
  col.style.fontSize = (9 + Math.random() * 4) + 'px';
  let txt = '';
  for (let j = 0; j < 20; j++) txt += snippets[Math.floor(Math.random()*snippets.length)] + ' ';
  col.textContent = txt;
  rain.appendChild(col);
}

// Particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 280;

const particles = [];
for (let i = 0; i < 55; i++) {
  particles.push({
    x: Math.random() * 900,
    y: Math.random() * 280,
    r: Math.random() * 1.8 + 0.4,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    alpha: Math.random() * 0.5 + 0.2,
    color: Math.random() > 0.5 ? '74,127,212' : '170,200,255',
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, 900, 280);

  // Draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(74,127,212,${0.15 * (1 - dist/100)})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw dots
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > 900) p.vx *= -1;
    if (p.y < 0 || p.y > 280) p.vy *= -1;
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
</body>
</html>
